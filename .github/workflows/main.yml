name: Spring Boot CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # =========================
  # 🧪 JOB 1: TEST
  # =========================
  test:
    name: Run Tests with JaCoCo
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Cache de Maven (mejora rendimiento)
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # 4. Ejecutar pruebas + generar cobertura
      - name: Run tests
        run: mvn clean verify

      # 5. Subir reporte JaCoCo
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # =========================
  # 🧱 JOB 2: BUILD
  # =========================
  build:
    name: Build Jar
    runs-on: ubuntu-latest
    needs: test   # 👈 CLAVE: depende de test

    steps:
      # 1. Clonar repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Construir JAR
      - name: Build JAR
        run: mvn clean package -DskipTests

      # 4. Subir artefacto JAR
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar